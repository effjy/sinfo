<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#bg)"/>

  <!-- service list rows, each with a status dot -->
  <g>
    <rect x="22" y="28" width="84" height="16" rx="8" fill="#ffffff" opacity="0.95"/>
    <circle cx="31" cy="36" r="4.2" fill="#22c55e"/>

    <rect x="22" y="54" width="84" height="16" rx="8" fill="#ffffff" opacity="0.95"/>
    <circle cx="31" cy="62" r="4.2" fill="#f59e0b"/>

    <rect x="22" y="80" width="84" height="16" rx="8" fill="#ffffff" opacity="0.95"/>
    <circle cx="31" cy="88" r="4.2" fill="#ef4444"/>
  </g>

  <!-- settings cog badge (bottom-right) -->
  <g transform="translate(95,96)">
    <g fill="#ffffff">
      <g>
        <rect x="-3.5" y="-21" width="7" height="11" rx="2"/>
      </g>
      <g transform="rotate(45)">
        <rect x="-3.5" y="-21" width="7" height="11" rx="2"/>
      </g>
      <g transform="rotate(90)">
        <rect x="-3.5" y="-21" width="7" height="11" rx="2"/>
      </g>
      <g transform="rotate(135)">
        <rect x="-3.5" y="-21" width="7" height="11" rx="2"/>
      </g>
      <g transform="rotate(180)">
        <rect x="-3.5" y="-21" width="7" height="11" rx="2"/>
      </g>
      <g transform="rotate(225)">
        <rect x="-3.5" y="-21" width="7" height="11" rx="2"/>
      </g>
      <g transform="rotate(270)">
        <rect x="-3.5" y="-21" width="7" height="11" rx="2"/>
      </g>
      <g transform="rotate(315)">
        <rect x="-3.5" y="-21" width="7" height="11" rx="2"/>
      </g>
    </g>
    <circle r="15" fill="#ffffff"/>
    <circle r="6.5" fill="#1e3a8a"/>
  </g>
</svg>
